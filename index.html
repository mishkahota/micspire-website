    <title>MICSPIRE | Find Your Voice. Speak with Confidence.</title>

    <style>
        /* Global & Theme Variables */
        :root {
            --primary-orange: #f47920;
            --light-gold: #ffebc2;
            --deep-plum: #582433;
            --text-dark: #2d2d2d;
            --bg-light: #fefcf9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* Typography styling using modern fonts */
        h1, h2, h3, .logo {
            color: var(--deep-plum);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        /* Fade-In Animation Rules */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Navigation Banner */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            animation: fadeIn 1s ease-out;
        }

        header .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary-orange), #ff9f55);
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(244, 121, 32, 0.3);
        }

        header .logo {
            font-size: 1.6rem;
            letter-spacing: 2px;
        }

        nav a {
            color: var(--text-dark);
            text-decoration: none;
            margin-left: 24px;
            font-weight: 600;
            font-size: 0.95rem;
            position: relative;
            transition: color 0.3s;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--primary-orange);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--primary-orange);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: radial-gradient(circle at center, var(--light-gold) 0%, #fff6e5 100%);
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        .hero h1 {
            font-size: 5rem;
            letter-spacing: 6px;
            margin-bottom: 15px;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

            font-size: 1.6rem;
            color: var(--text-dark);
            margin-bottom: 35px;
